<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト企業 - エントリーシート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: #f5f5f5; color: #333; }
    .header { background: #1a3a5c; color: white; padding: 20px 40px; }
    .header h1 { font-size: 20px; }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .container { max-width: 720px; margin: 30px auto; padding: 0 20px; }
    .form-card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-card h2 { font-size: 18px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #1a3a5c; }
    .field-group { margin-bottom: 24px; }
    .field-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #1a3a5c; }
    .field-group .hint { font-size: 12px; color: #888; margin-bottom: 6px; }
    .field-group input[type="text"],
    .field-group input[type="email"],
    .field-group input[type="tel"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    .field-group textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
      font-family: inherit; line-height: 1.6; resize: vertical;
    }
    .field-group select {
      padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    .char-count { text-align: right; font-size: 11px; color: #999; margin-top: 4px; }
    .submit-btn {
      display: block; width: 200px; margin: 30px auto 0; padding: 12px; background: #1a3a5c; color: white;
      border: none; border-radius: 6px; font-size: 15px; cursor: pointer;
    }
    .submit-btn:hover { background: #2a4a6c; }
    .search-bar { padding: 10px 40px; background: #eee; }
    .search-bar input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; width: 250px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>株式会社テスト商事</h1>
    <p>2027年度 新卒採用 エントリーシート</p>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="サイト内検索..." id="site-search">
  </div>

  <div class="container">
    <div class="form-card">
      <h2>エントリーシート入力フォーム</h2>

      <!-- 基本情報 -->
      <div class="field-group">
        <label for="fullname">氏名（漢字）</label>
        <input type="text" id="fullname" name="fullname" placeholder="例：山田 太郎">
      </div>

      <div class="field-group">
        <label for="furigana">氏名（フリガナ）</label>
        <input type="text" id="furigana" name="furigana" placeholder="例：ヤマダ タロウ">
      </div>

      <div class="field-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" placeholder="例：taro@example.com">
      </div>

      <div class="field-group">
        <label for="phone">電話番号</label>
        <input type="tel" id="phone" name="phone" placeholder="例：090-1234-5678">
      </div>

      <div class="field-group">
        <label for="university">大学名</label>
        <input type="text" id="university" name="university" placeholder="例：東京大学">
      </div>

      <div class="field-group">
        <label for="faculty">学部・学科</label>
        <input type="text" id="faculty" name="faculty" placeholder="例：経済学部 経済学科">
      </div>

      <div class="field-group">
        <label for="graduation">卒業予定年月</label>
        <select id="graduation" name="graduation">
          <option value="">選択してください</option>
          <option value="2027-03">2027年3月</option>
          <option value="2027-09">2027年9月</option>
          <option value="2028-03">2028年3月</option>
        </select>
      </div>

      <!-- ES本文 -->
      <div class="field-group">
        <label for="gakuchika">学生時代に最も力を入れたことを教えてください</label>
        <div class="hint">400字以内でご記入ください</div>
        <textarea id="gakuchika" name="gakuchika" rows="8" maxlength="400"></textarea>
        <div class="char-count"><span id="gakuchika-count">0</span>/400字</div>
      </div>

      <div class="field-group">
        <label for="self_pr">自己PRをお願いします</label>
        <div class="hint">あなたの強みを200字以内でアピールしてください</div>
        <textarea id="self_pr" name="self_pr" rows="5" maxlength="200"></textarea>
        <div class="char-count"><span id="selfpr-count">0</span>/200字</div>
      </div>

      <div class="field-group">
        <label for="motivation">志望動機</label>
        <div class="hint">当社を志望する理由を600字以内でお書きください</div>
        <textarea id="motivation" name="motivation" rows="10" maxlength="600"></textarea>
        <div class="char-count"><span id="motivation-count">0</span>/600字</div>
      </div>

      <div class="field-group">
        <label for="weakness">あなたの短所・改善したい点を教えてください</label>
        <div class="hint">200字以内</div>
        <textarea id="weakness" name="weakness" rows="4" maxlength="200"></textarea>
        <div class="char-count"><span id="weakness-count">0</span>/200字</div>
      </div>

      <button type="button" class="submit-btn">提出する</button>
    </div>
  </div>

  <script>
    // Character counter
    document.querySelectorAll('textarea').forEach(ta => {
      const countEl = ta.parentElement.querySelector('.char-count span');
      if (countEl) {
        ta.addEventListener('input', () => {
          countEl.textContent = [...ta.value].length;
        });
      }
    });
  </script>
</body>
</html>
